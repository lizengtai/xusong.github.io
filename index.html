<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嵩鼠猜歌挑战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">嵩鼠猜歌挑战</h1>
        <div class="level-info">
            <span id="current-level">第 1 关</span>
            <span id="difficulty">难度: 简单</span>
        </div>
        <div class="lyrics-container">
            <p id="lyric-1">-- 加载中 --</p>
            <p id="lyric-2">-- 加载中 --</p>
        </div>
        <div class="options-container" id="options">
            <!-- 选项将通过JS动态生成 -->
        </div>
        <div id="result" class="result"></div>
        <button id="restart-btn" class="restart-btn" style="display: none;">重新开始</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
